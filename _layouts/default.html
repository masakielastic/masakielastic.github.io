<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <style>
    :root {
      --bg: #fcfcfc;
      --text: #222;
      --muted: #666;
      --line: #ddd;
      --accent: #2f6feb;
      --card: #ffffff;
      --max-width: 760px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.8;
    }

    .site-wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    .hero {
      position: relative;
      padding: 56px 24px;
      border-radius: 20px;
      border: 1px solid var(--line);
      margin-bottom: 32px;
      overflow: hidden;
      background-image:
        linear-gradient(rgba(255,255,255,0.70), rgba(255,255,255,0.82)),
        url('/assets/images/header.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.3;
    }

    .hero-text {
      margin: 0;
      color: #444;
    }

    .site-header {
      margin-bottom: 24px;
    }

    .site-title {
      margin: 0;
      font-size: 1.5rem;
    }

    .site-title a {
      color: inherit;
      text-decoration: none;
    }

    .site-description {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .site-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .site-nav a,
    .lang-switch a {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 9999px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      transition: 0.2s ease;
    }

    .site-nav a:hover,
    .lang-switch a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .lang-switch {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .lang-switch .current {
      display: inline-block;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 9999px;
      background: #f3f6fb;
      color: var(--text);
      font-weight: 600;
    }

    main {
      margin-top: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 720px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    h1, h2, h3 {
      line-height: 1.4;
    }

    h1 {
      margin-top: 0;
    }

    a {
      color: var(--accent);
    }

    ul {
      padding-left: 1.2em;
    }

    footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="site-wrap">
    {% include header.html %}

    {% if page.url == "/index.html" or page.url == "/en/index.html" %}
      <section class="hero">
        <h2 class="hero-title">{{ page.hero_title | default: site.title }}</h2>
        <p class="hero-text">{{ page.hero_text | default: site.description }}</p>
      </section>
    {% endif %}

    <main>
      {{ content }}
    </main>

    <footer>
      <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </footer>
  </div>
</body>
</html>
