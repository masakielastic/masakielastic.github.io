<!doctype html>
<html lang="{{ page.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Yu Gothic", sans-serif;
      line-height: 1.8;
      color: #222;
      background: #fcfcfc;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }
    header {
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #ddd;
    }
    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    nav a {
      text-decoration: none;
      border: 1px solid #ddd;
      padding: 6px 10px;
      border-radius: 9999px;
      color: #222;
      background: white;
    }
    nav a:hover {
      color: #2f6feb;
      border-color: #2f6feb;
    }
    .lang-switch {
      margin-top: 12px;
      font-size: 0.95rem;
    }
    .lang-switch a {
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% include header.html %}
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
