<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
  </title>
  <style>
    :root {
      --bg: #fcfcfc;
      --text: #222;
      --muted: #666;
      --line: #ddd;
      --accent: #2f6feb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.8;
    }

    .site-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    .site-header {
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .site-title {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    .site-title a {
      color: inherit;
      text-decoration: none;
    }

    .site-description {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .site-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .site-nav a {
      display: inline-block;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 9999px;
      text-decoration: none;
      color: var(--text);
      background: #fff;
    }

    .site-nav a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    main h1 {
      line-height: 1.4;
      margin-top: 0;
    }

    footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="site-wrap">
    {% include header.html %}

    <main>
      {{ content }}
    </main>

    <footer>
      <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </footer>
  </div>
</body>
</html>
